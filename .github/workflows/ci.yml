name: CI

on:
  push:
    branches: ["main", "develop", "name-added"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch: {}

jobs:
  test-client:
    name: Frontend — test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('client/package-lock.json', 'client/yarn.lock', 'client/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run tests (vitest)
        run: npm test

      - name: Build client
        run: npm run build

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: client/dist

  test-server:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('server/package-lock.json', 'server/yarn.lock', 'server/package.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run server tests (jest)
        run: npm test

  package-artifacts:
    name: Package artifacts
    runs-on: ubuntu-latest
    needs: [test-client, test-server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download client build
        uses: actions/download-artifact@v4
        with:
          name: client-build

      - name: Create combined artifact
        run: |
          mkdir -p artifacts
          if [ -d client/dist ]; then cp -r client/dist artifacts/client-dist; fi
          tar -czf artifacts.tar.gz artifacts || true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts.tar.gz

  # A deployment job isn't enabled by default because deploy targets vary.
  # You can add a `deploy` job here that depends on `package-artifacts` and uses secrets
  # (for example, a server via rsync/SSH, or a provider action for Vercel/Netlify).
